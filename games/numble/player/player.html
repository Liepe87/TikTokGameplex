<!--
    Numble player view — embedded as a fragment into the launcher's player shell.
    The shell injects this HTML into #game-view and then loads client.js.
-->
<style>
.numble-root {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
    background-image:
        radial-gradient(ellipse at 20% 20%, #2a1f4a 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, #1f2a3a 0%, transparent 50%);
    font-family: 'Nunito', sans-serif;
    color: var(--text);
}

.numble-root h1.logo {
    font-family: 'Boogaloo', cursive;
    font-size: clamp(2.5rem, 8vw, 4.5rem);
    color: var(--yellow);
    text-shadow: 0 0 40px rgba(255,230,109,0.4), 4px 4px 0 var(--accent);
    text-align: center;
    margin-bottom: 8px;
}
.numble-root .tagline {
    color: var(--muted);
    font-size: 0.9rem;
    text-align: center;
    margin-bottom: 40px;
    letter-spacing: 2px;
    text-transform: uppercase;
}

.numble-root .screen {
    display: none;
    width: 100%;
    max-width: 600px;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    animation: numbleFadeIn 0.35s ease;
}
.numble-root .screen.active { display: flex; }
@keyframes numbleFadeIn {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
}

.numble-root .card {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

.numble-root .timer {
    font-family: 'Boogaloo', cursive;
    font-size: 3rem;
    color: var(--yellow);
    line-height: 1;
    min-width: 56px;
    text-align: center;
    transition: color 0.3s;
}
.numble-root .timer.urgent { color: var(--red); animation: numblePulse 0.5s infinite alternate; }
@keyframes numblePulse {
    from { transform: scale(1); }
    to   { transform: scale(1.1); }
}

.numble-root .stats-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding: 10px 16px;
    background: var(--surface);
    border-radius: 10px;
    font-size: 0.9rem;
    color: var(--muted);
    font-weight: 700;
}
.numble-root .stats-bar span b { color: var(--yellow); }

.numble-root .number-stage {
    width: 100%;
    min-height: 220px;
    border-radius: 16px;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    text-align: center;
    position: relative;
    overflow: hidden;
}
.numble-root .number-stage::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(255,107,53,0.12), transparent 60%);
    pointer-events: none;
}
.numble-root .number-display {
    font-family: 'Boogaloo', cursive;
    font-size: clamp(4rem, 16vw, 8rem);
    color: var(--yellow);
    line-height: 1;
    user-select: none;
    position: relative;
    text-shadow: 0 0 30px rgba(255,230,109,0.3);
}
.numble-root .number-display.reveal {
    animation: numbleReveal 0.6s ease;
}
@keyframes numbleReveal {
    0%   { transform: scale(0.5); opacity: 0; }
    60%  { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
}
.numble-root .number-prompt {
    font-family: 'Boogaloo', cursive;
    font-size: 1.2rem;
    color: var(--accent);
    letter-spacing: 1px;
    margin-top: 8px;
    position: relative;
}

.numble-root .guess-feed {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 120px;
    overflow: hidden;
}
.numble-root .guess-item {
    background: var(--surface);
    border-left: 3px solid var(--accent);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 0.9rem;
    font-weight: 700;
    animation: numbleSlideIn 0.25s ease;
}
@keyframes numbleSlideIn {
    from { opacity: 0; transform: translateX(-8px); }
    to   { opacity: 1; transform: translateX(0); }
}

.numble-root .results-list {
    list-style: none;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
}
.numble-root .results-list li {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--surface);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.05);
    font-size: 0.95rem;
}
.numble-root .results-list li.exact {
    border-color: var(--green);
    background: rgba(6,214,160,0.1);
}
.numble-root .res-rank   { font-size: 1.4rem; width: 32px; text-align: center; }
.numble-root .res-name   { flex: 1; font-weight: 700; }
.numble-root .res-guess  { font-family: 'Boogaloo', cursive; font-size: 1.2rem; color: var(--yellow); min-width: 36px; text-align: center; }
.numble-root .res-dist   { font-size: 0.85rem; color: var(--muted); min-width: 80px; text-align: right; }
.numble-root .res-dist.exact-label { color: var(--green); font-weight: 900; }

.numble-root .lb-title {
    font-family: 'Boogaloo', cursive;
    font-size: 2.2rem;
    color: var(--yellow);
    text-align: center;
    letter-spacing: 2px;
}
.numble-root .lb-progress {
    font-family: 'Boogaloo', cursive;
    font-size: 1.1rem;
    color: var(--accent);
    text-align: center;
}
.numble-root .lb-list {
    list-style: none;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
}
.numble-root .lb-list li {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--surface);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.05);
}
.numble-root .lb-list li.winner { border-color: var(--yellow); background: rgba(255,230,109,0.07); }
.numble-root .lb-rank  { font-size: 1.4rem; width: 32px; text-align: center; }
.numble-root .lb-name  { flex: 1; font-weight: 700; }
.numble-root .lb-score { font-family: 'Boogaloo', cursive; font-size: 1.4rem; color: var(--yellow); }

.numble-root .muted { color: var(--muted); font-size: 0.85rem; text-align: center; }

.numble-root .waiting-card {
    text-align: center;
    padding: 40px 28px;
}
.numble-root .waiting-card p {
    font-family: 'Boogaloo', cursive;
    font-size: 1.6rem;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 8px;
}
.numble-root .waiting-card small {
    color: var(--muted);
    font-size: 0.9rem;
}

.numble-toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #2a1f4a;
    border: 1px solid var(--yellow);
    color: var(--yellow);
    font-family: 'Boogaloo', cursive;
    font-size: 1.1rem;
    padding: 12px 24px;
    border-radius: 50px;
    opacity: 0;
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
    white-space: nowrap;
    z-index: 999;
}
.numble-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}
</style>

<div class="numble-root">

    <h1 class="logo">Numble</h1>
    <p class="tagline">Guess the number, win the round</p>

    <!-- Waiting for host to start -->
    <div id="numble-screen-waiting" class="screen active">
        <div class="card waiting-card">
            <p>&#9203; Waiting for host&hellip;</p>
            <small>Game will begin when the host starts it</small>
        </div>
    </div>

    <!-- Active round -->
    <div id="numble-screen-game" class="screen">
        <div class="stats-bar">
            <span>Round <b id="numble-round-num">1</b> / <b id="numble-round-total">10</b></span>
            <span><b id="numble-guess-count">0</b> guesses</span>
        </div>
        <div class="number-stage">
            <div id="numble-number-display" class="number-display">?</div>
            <p class="number-prompt">Type a number 0 &ndash; 100 in chat!</p>
        </div>
        <div style="display:flex;align-items:center;gap:16px;width:100%;">
            <div id="numble-timer" class="timer">&ndash;</div>
            <div id="numble-guess-feed" class="guess-feed"></div>
        </div>
    </div>

    <!-- Round results -->
    <div id="numble-screen-results" class="screen">
        <div class="number-stage" style="min-height:160px;">
            <div id="numble-target-display" class="number-display reveal">0</div>
            <p class="number-prompt" id="numble-results-subtitle">The target was&hellip;</p>
        </div>
        <ul id="numble-results-list" class="results-list"></ul>
        <p class="muted" id="numble-results-total"></p>
    </div>

    <!-- Leaderboard between rounds -->
    <div id="numble-screen-leaderboard" class="screen">
        <p class="lb-title">&#127942; Leaderboard</p>
        <p id="numble-lb-progress" class="lb-progress"></p>
        <ul id="numble-lb-list" class="lb-list"></ul>
        <p class="muted">Next round in <b id="numble-lb-countdown" style="color:var(--accent);">6</b>s&hellip;</p>
    </div>

    <!-- Final results -->
    <div id="numble-screen-gameover" class="screen">
        <p class="lb-title">&#127942; Final Results</p>
        <ul id="numble-gameover-list" class="lb-list"></ul>
        <p class="muted">Thanks for playing!</p>
    </div>

</div>
