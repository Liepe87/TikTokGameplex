<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StoryChain &mdash; Host Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --bg:     #0f0e17;
    --card:   #221f35;
    --surface:#1a1829;
    --accent: #ff6b35;
    --yellow: #ffe66d;
    --green:  #06d6a0;
    --red:    #ef233c;
    --text:   #fffffe;
    --muted:  #a7a9be;
}

body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
}

.top-bar {
    width: 100%;
    max-width: 820px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
}
.back-link {
    color: var(--muted);
    text-decoration: none;
    font-weight: 700;
    font-size: 0.9rem;
    padding: 8px 14px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    transition: border-color 0.2s, color 0.2s;
}
.back-link:hover { color: var(--accent); border-color: var(--accent); }

h1 {
    font-family: 'Boogaloo', cursive;
    font-size: 2rem;
    color: var(--yellow);
    text-shadow: 3px 3px 0 var(--accent);
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    width: 100%;
    max-width: 820px;
}

@media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }

.card {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 16px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
}
.card.full { grid-column: 1 / -1; }

.card h2 {
    font-family: 'Boogaloo', cursive;
    font-size: 1.2rem;
    color: var(--yellow);
    letter-spacing: 1px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    padding-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
}
.card h2 .badge {
    font-family: 'Nunito', sans-serif;
    font-size: 0.8rem;
    font-weight: 400;
    color: var(--muted);
}

label {
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    display: block;
    margin-bottom: 4px;
}

input[type="number"], input[type="text"] {
    width: 100%;
    padding: 10px 14px;
    border-radius: 10px;
    border: 2px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    outline: none;
    transition: border-color 0.2s;
}
input:focus { border-color: var(--accent); }

.toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.toggle-row span { font-weight: 700; font-size: 0.95rem; }

.btn {
    padding: 12px 16px;
    border-radius: 10px;
    border: none;
    font-family: 'Boogaloo', cursive;
    font-size: 1.1rem;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
    width: 100%;
}
.btn:active  { transform: scale(0.97); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }

.btn-start  { background: var(--green);  color: #111; }
.btn-reset  { background: var(--red);    color: #fff; }
.btn-pause  { background: var(--yellow); color: #111; }
.btn-resume { background: var(--accent); color: #fff; }
.btn-apply  { background: var(--accent); color: #fff; }
.btn-skip   { background: var(--red);    color: #fff; padding: 8px 16px; width: auto; font-size: 1rem; }

.btn-row { display: flex; gap: 10px; }
.btn-row .btn { flex: 1; }

#status-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-weight: 900;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    background: rgba(255,255,255,0.1);
    color: var(--muted);
}
#status-badge.running { background: rgba(6,214,160,0.2);  color: var(--green); }
#status-badge.paused  { background: rgba(255,230,109,0.2); color: var(--yellow); }
#status-badge.stopped { background: rgba(239,35,60,0.2);   color: var(--red); }

.current-turn-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
}
.current-turn-name {
    font-family: 'Boogaloo', cursive;
    font-size: 1.3rem;
    color: var(--green);
}

.story-display {
    background: var(--surface);
    border-radius: 10px;
    padding: 16px;
    min-height: 80px;
    max-height: 220px;
    overflow-y: auto;
    font-size: 1rem;
    line-height: 1.7;
    color: var(--text);
    word-wrap: break-word;
}
.story-display .empty { color: var(--muted); font-style: italic; }

.pool-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 240px;
    overflow-y: auto;
}
.pool-list li {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: var(--surface);
    border-radius: 8px;
    font-size: 0.9rem;
}
.pool-list .name { flex: 1; font-weight: 700; }
.pool-list .current-tag {
    color: var(--green);
    font-weight: 900;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
}
.btn-pool-select {
    background: rgba(255,255,255,0.08);
    color: var(--muted);
    border: 1px solid rgba(255,255,255,0.12);
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
}
.btn-pool-select:hover { color: var(--accent); border-color: var(--accent); }

.select-row {
    display: flex;
    gap: 8px;
}
.select-row input { flex: 1; }
.select-row .btn { width: auto; padding: 10px 16px; }

.priority-info {
    font-size: 0.85rem;
    color: var(--accent);
    font-weight: 700;
}
</style>
</head>
<body>

<div class="top-bar">
    <a class="back-link" href="/host">&larr; Back to Lobby</a>
    <h1>&#128220; StoryChain Host</h1>
    <span style="width:100px;"></span>
</div>

<div class="grid">

    <div class="card full">
        <h2>Status</h2>
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
            <span id="status-badge" class="stopped">Stopped</span>
            <span id="status-detail" style="color:var(--muted);font-size:0.9rem;">Game not started</span>
        </div>
        <div class="current-turn-row">
            <span style="color:var(--muted);font-size:0.85rem;font-weight:700;">CURRENT TURN:</span>
            <span class="current-turn-name" id="current-player">&mdash; none &mdash;</span>
            <button class="btn btn-skip" id="btn-skip" disabled>&#9197; Skip</button>
        </div>
        <div class="priority-info" id="priority-info"></div>
    </div>

    <div class="card full">
        <h2>Story <span class="badge" id="word-count">0 words</span></h2>
        <div class="story-display" id="story-text"><span class="empty">The story will appear here&hellip;</span></div>
    </div>

    <div class="card">
        <h2>Game Controls</h2>
        <div class="btn-row">
            <button class="btn btn-start"  id="btn-start">&#9654; Start</button>
            <button class="btn btn-reset"  id="btn-reset">&#8634; Reset</button>
        </div>
        <div class="btn-row">
            <button class="btn btn-pause"  id="btn-pause"  disabled>&#9208; Pause</button>
            <button class="btn btn-resume" id="btn-resume" disabled>&#9654; Resume</button>
        </div>
    </div>

    <div class="card">
        <h2>Configuration</h2>
        <div>
            <label>Turn Time (seconds)</label>
            <input type="number" id="cfg-turn-time" value="15" min="5" max="120">
        </div>
        <button class="btn btn-apply" id="btn-apply">Apply</button>
    </div>

    <div class="card full">
        <h2>Player Pool <span class="badge" id="pool-count">0 players</span></h2>
        <div class="select-row">
            <input type="text" id="select-player-input" placeholder="Type a username&hellip;">
            <button class="btn btn-apply" id="btn-select-input">Select</button>
        </div>
        <ul class="pool-list" id="pool-list">
            <li style="color:var(--muted);justify-content:center;">No players yet &mdash; viewers join by typing in chat</li>
        </ul>
    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
var socket = io("/storychain");
var currentPool = [];

socket.on("hostState", function(state) {
    var badge  = document.getElementById("status-badge");
    var detail = document.getElementById("status-detail");

    if (!state.started) {
        badge.className = "stopped";
        badge.innerText = "Stopped";
        detail.innerText = "Game not started";
    } else if (state.paused) {
        badge.className = "paused";
        badge.innerText = "Paused";
        detail.innerText = "Game is paused";
    } else {
        badge.className = "running";
        badge.innerText = "Running";
        detail.innerText = state.wordCount + " word" + (state.wordCount !== 1 ? "s" : "") + " written";
    }

    // Current player
    var cpEl = document.getElementById("current-player");
    if (state.currentPlayer) {
        cpEl.innerText = state.currentPlayer;
        document.getElementById("btn-skip").disabled = !state.started || state.paused;
    } else {
        cpEl.innerText = "\u2014 none \u2014";
        document.getElementById("btn-skip").disabled = true;
    }

    // Priority queue
    var pqEl = document.getElementById("priority-info");
    if (state.priorityQueue && state.priorityQueue.length > 0) {
        pqEl.innerText = "\uD83C\uDF81 Next up from gifts: " + state.priorityQueue.join(", ");
    } else {
        pqEl.innerText = "";
    }

    // Story
    var storyEl = document.getElementById("story-text");
    if (state.storyText) {
        storyEl.innerText = state.storyText;
    } else {
        storyEl.innerHTML = '<span class="empty">The story will appear here\u2026</span>';
    }
    storyEl.scrollTop = storyEl.scrollHeight;
    document.getElementById("word-count").innerText = state.wordCount + " word" + (state.wordCount !== 1 ? "s" : "");

    // Config
    document.getElementById("cfg-turn-time").value = state.turnTime / 1000;

    // Buttons
    document.getElementById("btn-start").disabled  = state.started;
    document.getElementById("btn-pause").disabled  = !state.started || state.paused;
    document.getElementById("btn-resume").disabled = !state.started || !state.paused;

    // Pool
    updatePool(state.pool || [], state.currentPlayer);
});

function updatePool(pool, currentPlayer) {
    currentPool = pool;
    document.getElementById("pool-count").innerText = pool.length + " player" + (pool.length !== 1 ? "s" : "");
    var ul = document.getElementById("pool-list");
    if (!pool.length) {
        ul.innerHTML = '<li style="color:var(--muted);justify-content:center;">No players yet \u2014 viewers join by typing in chat</li>';
        return;
    }
    ul.innerHTML = "";
    pool.forEach(function(p, i) {
        var li = document.createElement("li");
        var isCurrent = p === currentPlayer;
        li.innerHTML =
            '<span class="name">' + escapeHtml(p) + '</span>' +
            (isCurrent
                ? '<span class="current-tag">\u25CF Current</span>'
                : '<button class="btn-pool-select" data-index="' + i + '">Select</button>');
        ul.appendChild(li);
    });
}

document.getElementById("pool-list").addEventListener("click", function(e) {
    var btn = e.target.closest(".btn-pool-select");
    if (!btn) return;
    var player = currentPool[parseInt(btn.dataset.index)];
    if (player) selectPlayer(player);
});

document.getElementById("btn-select-input").addEventListener("click", function() {
    var input = document.getElementById("select-player-input");
    var player = input.value.trim();
    if (player) {
        selectPlayer(player);
        input.value = "";
    }
});

document.getElementById("select-player-input").addEventListener("keydown", function(e) {
    if (e.key === "Enter") document.getElementById("btn-select-input").click();
});

function selectPlayer(player) {
    post("/host/storychain/action", { type: "selectPlayer", player: player });
}

document.getElementById("btn-skip").addEventListener("click", function() {
    post("/host/storychain/action", { type: "skip" });
});

document.getElementById("btn-start").addEventListener("click", function() {
    var turnTime = (parseInt(document.getElementById("cfg-turn-time").value) || 15) * 1000;
    post("/host/storychain/start", { turnTime: turnTime });
});

document.getElementById("btn-reset").addEventListener("click", function() {
    if (confirm("Reset the game? The story will be lost.")) post("/host/storychain/reset");
});

document.getElementById("btn-pause").addEventListener("click",  function() { post("/host/storychain/pause"); });
document.getElementById("btn-resume").addEventListener("click", function() { post("/host/storychain/resume"); });

document.getElementById("btn-apply").addEventListener("click", function() {
    var turnTime = (parseInt(document.getElementById("cfg-turn-time").value) || 15) * 1000;
    post("/host/storychain/config", { turnTime: turnTime });
});

function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, function(c) {
        return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c];
    });
}

async function post(url, body) {
    await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body || {})
    });
}
</script>
</body>
</html>
