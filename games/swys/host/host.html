<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SWYS — Host Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --bg:     #0f0e17;
    --card:   #221f35;
    --surface:#1a1829;
    --accent: #ff6b35;
    --yellow: #ffe66d;
    --green:  #06d6a0;
    --red:    #ef233c;
    --text:   #fffffe;
    --muted:  #a7a9be;
}

body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
}

.top-bar {
    width: 100%;
    max-width: 820px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
}
.back-link {
    color: var(--muted);
    text-decoration: none;
    font-weight: 700;
    font-size: 0.9rem;
    padding: 8px 14px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    transition: border-color 0.2s, color 0.2s;
}
.back-link:hover { color: var(--accent); border-color: var(--accent); }

h1 {
    font-family: 'Boogaloo', cursive;
    font-size: 2rem;
    color: var(--yellow);
    text-shadow: 3px 3px 0 var(--accent);
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    width: 100%;
    max-width: 820px;
}

@media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }

.card {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 16px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
}
.card.full { grid-column: 1 / -1; }

.card h2 {
    font-family: 'Boogaloo', cursive;
    font-size: 1.2rem;
    color: var(--yellow);
    letter-spacing: 1px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    padding-bottom: 10px;
}

label {
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    display: block;
    margin-bottom: 4px;
}

input[type="number"] {
    width: 100%;
    padding: 10px 14px;
    border-radius: 10px;
    border: 2px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    outline: none;
    transition: border-color 0.2s;
}
input[type="number"]:focus { border-color: var(--accent); }

.toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.toggle-row span { font-weight: 700; font-size: 0.95rem; }
.toggle { position: relative; width: 52px; height: 28px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.1);
    border-radius: 28px;
    cursor: pointer;
    transition: background 0.3s;
}
.toggle-slider::before {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    left: 4px; top: 4px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.3s;
}
.toggle input:checked + .toggle-slider { background: var(--green); }
.toggle input:checked + .toggle-slider::before { transform: translateX(24px); }

.btn {
    padding: 12px 16px;
    border-radius: 10px;
    border: none;
    font-family: 'Boogaloo', cursive;
    font-size: 1.1rem;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
    width: 100%;
}
.btn:active  { transform: scale(0.97); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }

.btn-start  { background: var(--green);  color: #111; }
.btn-reset  { background: var(--red);    color: #fff; }
.btn-pause  { background: var(--yellow); color: #111; }
.btn-resume { background: var(--accent); color: #fff; }
.btn-apply  { background: var(--accent); color: #fff; }

.btn-row { display: flex; gap: 10px; }
.btn-row .btn { flex: 1; }

#status-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-weight: 900;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    background: rgba(255,255,255,0.1);
    color: var(--muted);
}
#status-badge.running { background: rgba(6,214,160,0.2);  color: var(--green); }
#status-badge.paused  { background: rgba(255,230,109,0.2); color: var(--yellow); }
#status-badge.stopped { background: rgba(239,35,60,0.2);   color: var(--red); }

.score-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 280px;
    overflow-y: auto;
}
.score-list li {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: var(--surface);
    border-radius: 8px;
    font-size: 0.9rem;
}
.score-list .rank  { width: 24px; text-align: center; font-size: 1rem; }
.score-list .name  { flex: 1; font-weight: 700; }
.score-list .score { font-family: 'Boogaloo', cursive; font-size: 1.1rem; color: var(--yellow); }

.progress-bar-wrap {
    background: rgba(255,255,255,0.07);
    border-radius: 6px;
    height: 8px;
    overflow: hidden;
}
.progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 6px;
    transition: width 0.5s ease;
}

.info-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.85rem;
    color: var(--muted);
    font-weight: 700;
}
.info-row b { color: var(--text); }
</style>
</head>
<body>

<div class="top-bar">
    <a class="back-link" href="/host">← Back to Lobby</a>
    <h1>🎮 SWYS Host</h1>
    <span style="width:100px;"></span>
</div>

<div class="grid">

    <div class="card full">
        <h2>Status</h2>
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
            <span id="status-badge" class="stopped">Stopped</span>
            <span id="status-detail" style="color:var(--muted);font-size:0.9rem;">Game not started</span>
        </div>
        <div class="progress-bar-wrap">
            <div class="progress-bar" id="bonus-progress-bar" style="width:0%"></div>
        </div>
        <div class="info-row">
            <span>Catchphrase rounds: <b id="info-bonus">0 / 5</b></span>
            <span>Round time: <b id="info-roundtime">20s</b></span>
            <span>Autoplay: <b id="info-autoplay">Off</b></span>
        </div>
    </div>

    <div class="card">
        <h2>Game Controls</h2>
        <div class="btn-row">
            <button class="btn btn-start"  id="btn-start">▶ Start</button>
            <button class="btn btn-reset"  id="btn-reset">↺ Reset</button>
        </div>
        <div class="btn-row">
            <button class="btn btn-pause"  id="btn-pause"  disabled>⏸ Pause</button>
            <button class="btn btn-resume" id="btn-resume" disabled>▶ Resume</button>
        </div>
    </div>

    <div class="card">
        <h2>Configuration</h2>
        <div>
            <label>Catchphrase Rounds</label>
            <input type="number" id="cfg-bonus-rounds" value="5" min="1" max="50">
        </div>
        <div>
            <label>Round Time (seconds)</label>
            <input type="number" id="cfg-round-time" value="20" min="5" max="120">
        </div>
        <div class="toggle-row">
            <span>Autoplay (24/7 mode)</span>
            <label class="toggle">
                <input type="checkbox" id="cfg-autoplay">
                <span class="toggle-slider"></span>
            </label>
        </div>
        <div class="toggle-row">
            <span>Gift = +1 bonus round</span>
            <label class="toggle">
                <input type="checkbox" id="cfg-gift-bonus" checked>
                <span class="toggle-slider"></span>
            </label>
        </div>
        <div>
            <label>Min Gift Value (coins)</label>
            <input type="number" id="cfg-min-gift" value="0" min="0" max="50000">
        </div>
        <button class="btn btn-apply" id="btn-apply">Apply</button>
    </div>

    <div class="card full">
        <h2>Live Scores</h2>
        <ul class="score-list" id="score-list">
            <li style="color:var(--muted);justify-content:center;">No scores yet</li>
        </ul>
    </div>

    <div id="test-panel"></div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
// Connect to SWYS's own namespace for hostState updates.
const socket = io("/swys");

socket.on("hostState", state => {
    const badge  = document.getElementById("status-badge");
    const detail = document.getElementById("status-detail");

    if (!state.started) {
        badge.className = "stopped";
        badge.innerText = "Stopped";
        detail.innerText = "Game not started";
    } else if (state.paused) {
        badge.className = "paused";
        badge.innerText = "Paused";
        detail.innerText = "Game is paused";
    } else {
        badge.className = "running";
        badge.innerText = "Running";
        detail.innerText = `Round in progress`;
    }

    const pct = state.maxBonusRounds > 0
        ? (state.bonusRoundsPlayed / state.maxBonusRounds) * 100
        : 0;
    document.getElementById("bonus-progress-bar").style.width = pct + "%";

    document.getElementById("info-bonus").innerText =
        `${state.bonusRoundsPlayed} / ${state.maxBonusRounds}`;
    document.getElementById("info-roundtime").innerText =
        `${state.roundTime / 1000}s`;
    document.getElementById("info-autoplay").innerText =
        state.autoplay ? "On" : "Off";

    document.getElementById("cfg-bonus-rounds").value  = state.maxBonusRounds;
    document.getElementById("cfg-round-time").value    = state.roundTime / 1000;
    document.getElementById("cfg-autoplay").checked    = state.autoplay;
    document.getElementById("cfg-gift-bonus").checked  = state.giftBonus;
    document.getElementById("cfg-min-gift").value      = state.minGiftValue;

    document.getElementById("btn-start").disabled  = state.started;
    document.getElementById("btn-pause").disabled  = !state.started || state.paused;
    document.getElementById("btn-resume").disabled = !state.started || !state.paused;

    updateScores(state.scores || []);
});

function updateScores(board) {
    const medals = ["🥇","🥈","🥉"];
    const ul = document.getElementById("score-list");
    if (!board.length) {
        ul.innerHTML = `<li style="color:var(--muted);justify-content:center;">No scores yet</li>`;
        return;
    }
    ul.innerHTML = "";
    board.forEach((p, i) => {
        const li = document.createElement("li");
        li.innerHTML = `
            <span class="rank">${medals[i] || i + 1}</span>
            <span class="name">${p.username}</span>
            <span class="score">${p.score}</span>
        `;
        ul.appendChild(li);
    });
}

document.getElementById("btn-start").addEventListener("click", () => {
    const maxBonusRounds = parseInt(document.getElementById("cfg-bonus-rounds").value) || 5;
    const roundTime      = (parseInt(document.getElementById("cfg-round-time").value) || 20) * 1000;
    const autoplay       = document.getElementById("cfg-autoplay").checked;
    const giftBonus      = document.getElementById("cfg-gift-bonus").checked;
    const minGiftValue   = parseInt(document.getElementById("cfg-min-gift").value) || 0;
    post("/host/swys/start", { maxBonusRounds, roundTime, autoplay, giftBonus, minGiftValue });
});

document.getElementById("btn-reset").addEventListener("click", () => {
    if (confirm("Reset the game? All scores will be lost.")) post("/host/swys/reset");
});

document.getElementById("btn-pause").addEventListener("click",  () => post("/host/swys/pause"));
document.getElementById("btn-resume").addEventListener("click", () => post("/host/swys/resume"));

document.getElementById("btn-apply").addEventListener("click", () => {
    const maxBonusRounds = parseInt(document.getElementById("cfg-bonus-rounds").value) || 5;
    const roundTime      = (parseInt(document.getElementById("cfg-round-time").value) || 20) * 1000;
    const autoplay       = document.getElementById("cfg-autoplay").checked;
    const giftBonus      = document.getElementById("cfg-gift-bonus").checked;
    const minGiftValue   = parseInt(document.getElementById("cfg-min-gift").value) || 0;
    post("/host/swys/config", { maxBonusRounds, roundTime, autoplay, giftBonus, minGiftValue });
});

async function post(url, body = {}) {
    await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
    });
}
</script>
<script src="/test-panel.js" data-game="swys"></script>
</body>
</html>
